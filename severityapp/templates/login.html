{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url("{% static 'images/mm5.jpg' %}");
            background-size: cover;
            background-position: center;
        }

        header {
            width: 100%;
            height: 4rem;
            background-color: rgb(158, 184, 94);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #heading {
            padding: 1rem 0 0 15rem;
        }

        #component {
            position: absolute;
            right: 3rem;
            top: 1.4rem;
        }

        #component a {
            margin-left: 2rem;
            color: black;
            font-weight: bold;
            text-decoration: none;
        }

        main {
            padding: 4rem 1rem 5rem;
            min-height: 100vh;
        }

        img {
            display: block;
            width: 85%;
            height: 300px;
            margin: auto;
        }

        #loginh1 {
            text-align: center;
            color: aliceblue;
            font-size: 2rem;
            margin-top: 2rem;
        }
        form {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }

        form div {
            display: flex;
            align-items: center;
            margin: 1rem auto;
        }

        label {
            display: inline-block;
            width: 150px;
            font-size: 1.2rem;
            font-weight: bold;
            color: aliceblue;
        }

        input {
            width: 60%;
            padding: 0.7rem;
            border-radius: 4px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        #log-btn {
            display: block;
            padding: 0.7rem 4rem;
            margin: 1.5rem auto;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            border: none;
        }

        footer {
            background-color: rgb(158, 184, 94);
            width: 100%;
            padding: 0.5rem;
            position: fixed;
            bottom: 0;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    <div id="heading">
        <h1>Medical Bug Severity</h1>
    </div>

    <div id="component">
        <a href="/">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</header>

<main>

    <img src="{% static 'images/nn2.jpg' %}">

    <h2 id="loginh1">Login Page</h2>

    <form method="POST">
        {% csrf_token %}
        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        {% if success %}<p style="color:lightgreen;">{{ success }}</p>{% endif %}

        <div>
            <label>Name:</label>
            <input type="text" name="username" placeholder="Enter User Name" required autofocus>
        </div>

        <div>
            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" id="log-btn">Submit</button>
    </form>

</main>

<footer>
    <h4>&copy; 2025 All Rights Reserved SAK Informatics</h4>
</footer>

</body>
</html>
