{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=devicewidth initial-scale=1">
    <meta charset="utf-8">
    <title>Home</title>
    <style>
   *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
       }

       body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            background-image: url("{% static 'images/mm5.jpg' %}");
            background-size: cover;
            background-position: center;
       }

       header {
            width: 100%;
            height: 4rem;
            background-color: rgb(158, 184, 94);
            position: fixed;
            top: 0;
            z-index: 10;
       }

       #heading {
            padding: 1rem 0 0 15rem;
       }

       #component {
            position: absolute;
            right: 3rem;
            top: 1.3rem;
       }

       #component a {
            margin-left: 2rem;
            font-weight: bold;
            text-decoration: none;
            color: black;
       }

       main {
            padding-top: 6rem;
            min-height: 100vh;
       }

       img {
            display: block;
            width: 85%;
            height: 300px;
            margin: 2rem auto 1rem auto;
       }
       #main-head{
        text-align: center;
        color:aliceblue;
        padding-top: 3rem;
       }
footer {
    background-color: rgb(158, 184, 94);
    color: black;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 6px 0;
}

    </style>
</head>
<body>
    <header>
        <div id="heading">
            <h1>Medical Bug Severity</h1>
        </div>
            <div id="component">
            
                <a href="/">Home</a>
                <a href="{% url 'register' %}">Register</a>
                <a href="{% url 'login' %}">Login</a>
        </div>
        
    </header>
    <main>
        <img src="{% static 'images/nn2.jpg' %}"
        />
        <div id="main-head">
            <h2>Welcome to Home Page</h2>
        </div>
    </main>
    <footer>
        <h4 id="head-footer">&copy; 2025 All Rights Reserved SAK Informatics</h4>
    </footer>
</body>
</html>
